<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Shellipelago YAML Creator Shard</title>
</head>
<body>
  <template data-shard>
    <main class="screen screen-yaml" aria-labelledby="yaml-title">
      <form class="screen-panel connection-form yaml-form" id="yaml-form">
        <p class="screen-kicker">Archipelago</p>
        <h1 id="yaml-title">Create .yaml</h1>

        <section class="yaml-section">
          <label>
            <span>Slot Name</span>
            <input id="yaml-slot" name="slot" type="text" autocomplete="username" required>
          </label>
        </section>

        <section class="yaml-section yaml-upload-section">
          <label class="yaml-upload-row">
            <span>Load Existing .yaml</span>
            <input id="yaml-upload" type="file" accept=".yaml,.yml,text/yaml,text/plain">
          </label>
          <div class="yaml-maintenance-actions">
            <button class="secondary-button" id="yaml-download-default" type="button">Download Default</button>
            <button class="secondary-button" id="yaml-reset-default" type="button">Reset To Default</button>
          </div>
        </section>

        <div class="yaml-body-grid">
          <div class="yaml-options-column">
            <section class="yaml-section">
              <label class="yaml-progression-row">
                <span>Progression Balancing</span>
                <span class="yaml-progression-controls">
                  <input id="yaml-progression-balancing" name="progressionBalancing" type="range" min="0" max="99" value="50">
                  <input class="yaml-range-value" id="yaml-progression-balancing-value" type="number" min="0" max="99" value="50" inputmode="numeric" aria-label="Progression Balancing value">
                </span>
              </label>

              <label class="toggle-row">
                <input name="shuffleEssentialItems" type="checkbox" checked data-controls="essentialLocal essentialNonLocal">
                <span>Shuffle essential items</span>
              </label>
              <div class="yaml-two-column">
                <fieldset>
                  <legend>Local Items</legend>
                  <label><input type="checkbox" name="essentialLocal" value="Graphics" checked> Graphics</label>
                  <label><input type="checkbox" name="essentialLocal" value="Progressive Room" checked> Progressive Room</label>
                  <label><input type="checkbox" name="essentialLocal" value="Bombs" checked> Bombs</label>
                  <label><input type="checkbox" name="essentialLocal" value="Gun" checked> Gun</label>
                  <label><input type="checkbox" name="essentialLocal" value="Fire" checked> Fire</label>
                  <label><input type="checkbox" name="essentialLocal" value="Sword" checked> Sword</label>
                  <label><input type="checkbox" name="essentialLocal" value="Pickaxe" checked> Pickaxe</label>
                  <label><input type="checkbox" name="essentialLocal" value="Water Walkers" checked> Water Walkers</label>
                  <label><input type="checkbox" name="essentialLocal" value="Tank Treads" checked> Tank Treads</label>
                  <label><input type="checkbox" name="essentialLocal" value="Tank Chassis" checked> Tank Chassis</label>
                  <label><input type="checkbox" name="essentialLocal" value="Tank Cannon" checked> Tank Cannon</label>
                  <label><input type="checkbox" name="essentialLocal" value="SFX" checked> SFX</label>
                  <label><input type="checkbox" name="essentialLocal" value="BGM" checked> BGM</label>
                </fieldset>

                <fieldset>
                  <legend>Non Local Items</legend>
                  <label><input type="checkbox" name="essentialNonLocal" value="Graphics" checked> Graphics</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Progressive Room" checked> Progressive Room</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Bombs" checked> Bombs</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Gun" checked> Gun</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Fire" checked> Fire</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Sword" checked> Sword</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Pickaxe" checked> Pickaxe</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Water Walkers" checked> Water Walkers</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Tank Treads" checked> Tank Treads</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Tank Chassis" checked> Tank Chassis</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="Tank Cannon" checked> Tank Cannon</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="SFX" checked> SFX</label>
                  <label><input type="checkbox" name="essentialNonLocal" value="BGM" checked> BGM</label>
                </fieldset>
              </div>
            </section>

            <section class="yaml-section">
              <label class="toggle-row">
                <input name="shuffleMaxResourceUpgrades" type="checkbox" checked data-controls="resourceLocal resourceNonLocal">
                <span>Shuffle max resource upgrades</span>
              </label>
              <div class="yaml-two-column">
                <fieldset>
                  <legend>Local Items</legend>
                  <label><input type="checkbox" name="resourceLocal" value="Max HP" checked> Max HP</label>
                  <label><input type="checkbox" name="resourceLocal" value="Max Rounds" checked> Max Rounds</label>
                </fieldset>

                <fieldset>
                  <legend>Non Local Items</legend>
                  <label><input type="checkbox" name="resourceNonLocal" value="Max HP" checked> Max HP</label>
                  <label><input type="checkbox" name="resourceNonLocal" value="Max Rounds" checked> Max Rounds</label>
                </fieldset>
              </div>
            </section>

            <section class="yaml-section yaml-compact-options">
              <label class="toggle-row"><input name="addEasyDestructibleChecks" type="checkbox"> <span>Add destructible tiles to locations</span></label>
              <label class="toggle-row"><input name="enemiesAreChecks" type="checkbox"> <span>Add enemies to locations</span></label>
              <label class="toggle-row"><input name="enemiesAreHints" type="checkbox"> <span>Enemies are hints</span></label>
              <label class="toggle-row"><input name="shuffleShops" type="checkbox" checked> <span>Shuffle shops</span></label>
              <label class="toggle-row"><input name="showEssentialPickupHints" type="checkbox" checked> <span>Show essential pickup hints</span></label>
              <label class="toggle-row"><input name="otherPlayersCanFindItemPoolDrops" type="checkbox"> <span>Other players can find item pool drops</span></label>
              <label class="toggle-row" title="Syncs Rounds with rings in other games that have this enabled. As rounds are spent and gained, ring and round counts will fluctuate accordingly for all players with this option enabled."><input name="ringLink" type="checkbox" checked> <span>Ring Link (Rounds)</span></label>
              <label class="toggle-row" title="Similar to Ring Link, syncs Energy with other clients that have the option toggled."><input name="energyLink" type="checkbox" checked> <span>Energy Link</span></label>
              <label class="toggle-row" title="When a player with Death Link enabled dies, they send the death to other players with Death Link enabled, causing those games to trigger a death or game over."><input name="deathLink" type="checkbox"> <span>Death Link</span></label>
              <label class="toggle-row" title="When a player that has enabled Trap Link receives a trap that can be linked, they send that trap to other players that have Trap Link enabled. If another player's game supports that trap, both players have the effect applied."><input name="trapLink" type="checkbox" checked> <span>Trap Link</span></label>
              <label class="toggle-row" title="Allows players to link their items into a group with the same item link name and game. The items declared in Item Pool get combined and when an item is found for the group, all players in the group receive it. Item links can also have Local Items and Non Local Items, forcing the items to either be placed within the worlds of the group or in worlds outside the group. If players have a varying amount of a specific item in the link, the lowest amount from the players will be the amount put into the group."><input name="itemLink" type="checkbox"> <span>Item Link</span></label>
            </section>


            <section class="yaml-section yaml-trap-section">
              <label class="toggle-row">
                <input name="addTrapsToPool" type="checkbox" data-controls="trapFillPercentage trapFillPercentageValue trapPoolSpawn trapPoolLocal trapPoolNonLocal">
                <span>Add traps to pool</span>
              </label>
              <label class="yaml-progression-row">
                <span>Trap fill percentage</span>
                <span class="yaml-progression-controls">
                  <input name="trapFillPercentage" type="range" min="0" max="100" value="25">
                  <input class="yaml-range-value" name="trapFillPercentageValue" type="number" min="0" max="100" value="25">
                </span>
              </label>
              <div class="yaml-trap-state" id="yaml-trap-state" hidden></div>
              <div class="yaml-trap-columns" id="yaml-trap-columns">
                <section class="yaml-trap-column" data-trap-column="anywhere">
                  <h3>Anywhere</h3>
                  <div class="yaml-trap-list" data-trap-list="anywhere"></div>
                  <button class="secondary-button yaml-trap-all" type="button" data-trap-all="anywhere">All</button>
                </section>
                <section class="yaml-trap-column" data-trap-column="local">
                  <h3>My World</h3>
                  <div class="yaml-trap-list" data-trap-list="local"></div>
                  <button class="secondary-button yaml-trap-all" type="button" data-trap-all="local">All</button>
                </section>
                <section class="yaml-trap-column" data-trap-column="nonLocal">
                  <h3>Other Worlds</h3>
                  <div class="yaml-trap-list" data-trap-list="nonLocal"></div>
                  <button class="secondary-button yaml-trap-all" type="button" data-trap-all="nonLocal">All</button>
                </section>
                <section class="yaml-trap-column" data-trap-column="never">
                  <h3>Never</h3>
                  <div class="yaml-trap-list" data-trap-list="never"></div>
                  <button class="secondary-button yaml-trap-all" type="button" data-trap-all="never">All</button>
                </section>
              </div>
            </section>

          </div>

          <aside class="yaml-right-column">
            <section class="yaml-section yaml-check-counter" id="yaml-check-counter">
              <h2>Total Checks</h2>
              <dl>
                <div><dt>Total</dt><dd id="yaml-total-checks">0</dd></div>
                <div><dt>Chests</dt><dd id="yaml-chest-checks">0</dd></div>
                <div><dt>Destructible tiles</dt><dd id="yaml-easy-destructible-checks">0</dd></div>
                <div><dt>Enemies</dt><dd id="yaml-enemy-checks">0</dd></div>
                <div><dt>Shops</dt><dd id="yaml-shop-checks">0</dd></div>
                <div><dt>Hint triggers</dt><dd id="yaml-hint-checks">0</dd></div>
              </dl>
            </section>
          </aside>
        </div>

        <p class="connection-status" id="yaml-status" role="status"></p>

        <div class="form-actions">
          <button class="secondary-button" id="yaml-back" type="button">Back</button>
          <button class="primary-button" type="submit">Download .yaml</button>
        </div>
      </form>
      <dialog class="yaml-warning-dialog" id="yaml-destructible-warning">
        <h2>Destructible Tile Locations</h2>
        <p>Adding destructible tiles to locations creates many extra checks and can significantly slow down a playthrough.</p>
        <div class="yaml-warning-actions">
          <button class="secondary-button" id="yaml-destructible-cancel" type="button">Cancel</button>
          <button class="primary-button" id="yaml-destructible-confirm" type="button">I understand</button>
        </div>
      </dialog>
      <dialog class="yaml-warning-dialog" id="yaml-enemy-warning">
        <h2>Enemy Locations</h2>
        <p>Adding enemies to locations creates many extra checks and can significantly slow down a playthrough.</p>
        <div class="yaml-warning-actions">
          <button class="secondary-button" id="yaml-enemy-cancel" type="button">Cancel</button>
          <button class="primary-button" id="yaml-enemy-confirm" type="button">I understand</button>
        </div>
      </dialog>
    </main>
  </template>
</body>
</html>
